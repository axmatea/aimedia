<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AX MEDIA — Logo Concepts v2</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#060606; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; color:white; padding:48px; }
  h1 { font-size:10px; letter-spacing:.35em; color:rgba(255,255,255,.2); text-transform:uppercase; margin-bottom:48px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .card { display:flex; flex-direction:column; gap:12px; }
  .card img { width:100%; display:block; border-radius:4px; }
  .label { font-size:10px; letter-spacing:.3em; color:rgba(255,255,255,.25); text-transform:uppercase; }
  .desc { font-size:11px; color:rgba(255,255,255,.35); }
</style>
</head>
<body>
<h1>AX Media · Fal AI · Ideogram v2 · 2026</h1>
<div class="grid">
  <div class="card">
    <img src="/logo-gen/v2-01.jpg"/>
    <div class="label">01 — Blade Line</div>
    <div class="desc">AX massive · red slash · MEDIA below</div>
  </div>
  <div class="card">
    <img src="/logo-gen/v2-02.jpg"/>
    <div class="label">02 — Square Mark</div>
    <div class="desc">White square stamp · AX inside · MEDIA beside</div>
  </div>
  <div class="card">
    <img src="/logo-gen/v2-03.jpg"/>
    <div class="label">03 — Split Red</div>
    <div class="desc">A white + X crimson · psychedelic contrast</div>
  </div>
  <div class="card">
    <img src="/logo-gen/v2-04.jpg"/>
    <div class="label">04 — One Line</div>
    <div class="desc">AX bold + MEDIA thin · red vertical divider</div>
  </div>
</div>
</body>
</html>
