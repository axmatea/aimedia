<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AX MEDIA — Logo Concepts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: white;
    min-height: 100vh;
  }
  .header {
    padding: 48px 64px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: rgba(255,255,255,0.06);
    margin: 64px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .card {
    background: #080808;
    padding: 64px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }
  .card-label {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    text-align: center;
  }
  .concept-area {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 140px;
  }
  /* Dark bg versions */
  .on-light .card {
    background: #F0EEE8;
  }
  .variants {
    display: flex;
    gap: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0 64px 64px;
  }
  .variant {
    flex: 1;
    background: #F0EEE8;
    padding: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 120px;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    padding: 0 64px 20px;
    margin-top: 32px;
  }
</style>
</head>
<body>

<div class="header">AX MEDIA — Logo Concepts · 2026</div>

<!-- DARK BACKGROUNDS -->
<div style="padding: 64px 64px 0; font-size: 10px; letter-spacing: 0.3em; color: rgba(255,255,255,0.18); text-transform: uppercase; margin-bottom: 0;">On Dark</div>
<div class="grid">

  <!-- CONCEPT 01: WORDMARK SLASH -->
  <div class="card">
    <div class="concept-area">
      <svg width="220" height="100" viewBox="0 0 220 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- AX wordmark -->
        <text x="0" y="72" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="80" fill="white" letter-spacing="-2">AX</text>
        <!-- Red slash accent -->
        <rect x="0" y="82" width="180" height="2" fill="#FF2D55"/>
        <!-- MEDIA -->
        <text x="2" y="98" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="11" fill="rgba(255,255,255,0.45)" letter-spacing="7">MEDIA</text>
      </svg>
    </div>
    <div class="card-label">01 — Wordmark</div>
  </div>

  <!-- CONCEPT 02: MONOGRAM SQUARE -->
  <div class="card">
    <div class="concept-area">
      <svg width="220" height="100" viewBox="0 0 220 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Black square -->
        <rect x="0" y="0" width="80" height="80" fill="white"/>
        <!-- AX inside inverted -->
        <text x="8" y="62" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="54" fill="#080808" letter-spacing="-2">AX</text>
        <!-- MEDIA right -->
        <text x="96" y="44" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="13" fill="white" letter-spacing="5">AX</text>
        <text x="96" y="62" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="300" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="6">MEDIA</text>
      </svg>
    </div>
    <div class="card-label">02 — Mark + Word</div>
  </div>

  <!-- CONCEPT 03: PSYCHEDELIC MINIMAL -->
  <div class="card">
    <div class="concept-area">
      <svg width="220" height="100" viewBox="0 0 220 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- AX with X in red -->
        <text x="0" y="72" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="80" fill="white" letter-spacing="-2">A</text>
        <text x="52" y="72" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="80" fill="#FF2D55" letter-spacing="-2">X</text>
        <!-- Dot separator -->
        <circle cx="128" cy="56" r="3" fill="rgba(255,255,255,0.3)"/>
        <!-- MEDIA small -->
        <text x="138" y="62" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="12" fill="rgba(255,255,255,0.5)" letter-spacing="5">MEDIA</text>
      </svg>
    </div>
    <div class="card-label">03 — Split Accent</div>
  </div>

</div>

<!-- LIGHT BACKGROUNDS -->
<div style="padding: 0 64px 0; font-size: 10px; letter-spacing: 0.3em; color: rgba(255,255,255,0.18); text-transform: uppercase; margin-bottom: 0;">On Light</div>
<div class="variants">

  <div class="variant">
    <svg width="180" height="80" viewBox="0 0 180 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="58" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="64" fill="#080808" letter-spacing="-2">AX</text>
      <rect x="0" y="66" width="144" height="2" fill="#FF2D55"/>
      <text x="2" y="78" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="9" fill="rgba(0,0,0,0.35)" letter-spacing="6">MEDIA</text>
    </svg>
  </div>

  <div class="variant">
    <svg width="180" height="80" viewBox="0 0 180 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="64" height="64" fill="#080808"/>
      <text x="6" y="49" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="43" fill="white" letter-spacing="-2">AX</text>
      <text x="76" y="35" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="11" fill="#080808" letter-spacing="4">AX</text>
      <text x="76" y="50" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="300" font-size="9" fill="rgba(0,0,0,0.4)" letter-spacing="5">MEDIA</text>
    </svg>
  </div>

  <div class="variant">
    <svg width="180" height="80" viewBox="0 0 180 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="58" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="64" fill="#080808" letter-spacing="-2">A</text>
      <text x="42" y="58" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="64" fill="#FF2D55" letter-spacing="-2">X</text>
      <circle cx="104" cy="44" r="3" fill="rgba(0,0,0,0.2)"/>
      <text x="112" y="50" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="10" fill="rgba(0,0,0,0.4)" letter-spacing="4">MEDIA</text>
    </svg>
  </div>

</div>

</body>
</html>
