<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 24 326 110" fill="none" role="img" aria-label="AX Media Company">
  <title>AX Media Company</title>
  <!-- Tightened v6 lockup. In-app the nav/footer render an inline React SVG in the
       real webfonts (components/ui/ax-wordmark.tsx); this raw file serves OG/email
       contexts where fonts fall back, so x positions are calibrated for the wider
       Arial Narrow / Helvetica fallback advances. -->
  <!-- Signature slash: 24 deg per brand system -->
  <line x1="147" y1="116" x2="199" y2="92" stroke="#FF2D55" stroke-width="6" stroke-linecap="round"/>
  <text x="0" y="112" fill="#FFFFFF" font-family="'Bebas Neue', 'Arial Narrow', Impact, sans-serif" font-size="118" letter-spacing="0.02em">AX</text>
  <text x="215" y="106" fill="#FFFFFF" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="0.24em">MEDIA</text>
  <text x="215" y="130" fill="rgba(255,255,255,0.5)" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0.2em">COMPANY</text>
</svg>
