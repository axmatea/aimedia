<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 24 326 110" fill="none" role="img" aria-label="AX Media Company">
  <title>AX Media Company</title>
  <!-- Tightened v6 lockup. In-app the nav/footer render an inline React SVG in the
       real webfonts (components/ui/ax-wordmark.tsx); this raw file serves OG/email
       contexts where fonts fall back, so x positions are calibrated for the wider
       Arial Narrow / Helvetica fallback advances. -->
  <text x="0" y="112" fill="#050507" font-family="'Bebas Neue', 'Arial Narrow', Impact, sans-serif" font-size="118" letter-spacing="0.02em">AX</text>
  <text x="215" y="106" fill="#050507" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="0.24em">MEDIA</text>
  <text x="215" y="130" fill="rgba(5,5,7,0.5)" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" letter-spacing="0.2em">COMPANY</text>
  <!-- Signature strike (v6.2): 24 deg long diagonal painted AFTER the text so
       it crosses THROUGH the letters, low under A to high top right. -->
  <line x1="16" y1="120" x2="216" y2="31" stroke="#FF2D55" stroke-width="4" stroke-linecap="round"/>
</svg>
